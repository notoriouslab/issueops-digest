name: Scheduled Search

on:
  # schedule:
  #   # Uncomment to enable daily auto-search (set your Secrets first!)
  #   - cron: '0 8 * * *'
  workflow_dispatch:  # Manual trigger via Actions tab

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Searches from config.yaml
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, yaml

          with open("config.yaml", "r") as f:
              config = yaml.safe_load(f)

          topics = config.get("topics", [])
          profile = config.get("weight_profile", "default")

          if not topics:
              print("ERROR: No topics configured in config.yaml")
              exit(1)

          from web_digest import WebDigest
          digest = WebDigest(weight_profile=profile)

          issue_urls = []
          errors = []
          for topic in topics:
              print(f"\n{'='*50}")
              print(f"Topic: {topic}")
              print(f"{'='*50}")
              try:
                  result = digest.run_digest(topic)
                  print(result)
                  if result.startswith("http"):
                      issue_urls.append(result)
              except Exception as e:
                  print(f"Error processing '{topic}': {e}")
                  errors.append(topic)

          if errors and not issue_urls:
              print(f"\nERROR: All topics failed: {errors}")
              exit(1)
          elif errors:
              print(f"\nWARNING: Some topics failed: {errors}")

          # Save results for notification step and debug
          import json as _json
          os.makedirs("/tmp/debug", exist_ok=True)
          _json.dump({"topics": topics, "profile": profile, "issue_urls": issue_urls},
                     open("/tmp/debug/search_results.json", "w"), indent=2)
          with open("/tmp/issue_urls.txt", "w") as f:
              f.write("\n".join(issue_urls))
          PYEOF

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-debug-${{ github.run_number }}
          path: /tmp/debug/
          retention-days: 7

      - name: Notify via Telegram (optional)
        if: always()
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ] && echo "Telegram not configured, skipping." && exit 0
          URLS=$(cat /tmp/issue_urls.txt 2>/dev/null || echo "")
          [ -z "$URLS" ] && exit 0
          MSG=$(printf "📬 New issues ready for review:\n%s" "$URLS")
          # Use --data-urlencode to prevent injection via URL content
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            --data-urlencode "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MSG" \
            --data-urlencode "disable_web_page_preview=true"
